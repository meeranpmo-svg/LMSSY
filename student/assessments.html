<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tests & Assignments — SYPA IICPR</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/dashboard.css">
</head>
<body>
<script src="../assets/js/data.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/shell.js"></script>
<script>
const ctx = SYPA.Shell.mount({ role: 'student', title: 'Tests & Assignments', crumb: 'Learning · Assessments' });
if (ctx) {
  const { session, content } = ctx;
  const Data = SYPA.Data;
  const stu = Data.findStudent(session.userId);
  const enrolments = Data.enrolmentsFor(stu.id);
  const courseIds = enrolments.map(e => e.courseId);
  const all = Data.assessments().filter(a => courseIds.includes(a.courseId));
  const subs = Data.submissionsForStudent(stu.id);

  const rows = all.map(a => {
    const course = Data.findCourse(a.courseId);
    const sub = subs.find(s => s.assessmentId === a.id);
    const status = sub ? `<span class="pill success">Submitted · ${sub.score ?? '—'}/${sub.total ?? a.marks}</span>` : `<span class="pill warning">Pending</span>`;
    const action = sub
      ? `<a class="btn btn-sm btn-outline" href="grades.html">View Grade</a>`
      : `<a class="btn btn-sm btn-primary" href="take-test.html?id=${a.id}">${a.type === 'mcq' ? 'Start Test' : 'Submit Work'}</a>`;
    return `<tr>
      <td><strong>${a.title}</strong><div class="text-xs text-muted">${course ? course.title : ''}</div></td>
      <td><span class="pill ${a.type === 'mcq' ? 'purple' : 'info'}">${a.type === 'mcq' ? 'MCQ Test' : 'Assignment'}</span></td>
      <td>${a.durationMin ? a.durationMin + ' min' : '—'}</td>
      <td>${a.marks}</td>
      <td>${status}</td>
      <td>${action}</td>
    </tr>`;
  }).join('');

  content.innerHTML = `
    <div class="card">
      <div class="card-head"><h3>All Assessments</h3><div class="text-sm text-muted">${all.length} assessment${all.length === 1 ? '' : 's'} across your courses</div></div>
      ${all.length ? `<table class="table">
        <thead><tr><th>Assessment</th><th>Type</th><th>Duration</th><th>Marks</th><th>Status</th><th></th></tr></thead>
        <tbody>${rows}</tbody></table>` : '<div class="empty"><i class="fa-solid fa-file-circle-question"></i><div>No assessments published yet.</div></div>'}
    </div>`;
}
</script>
</body>
</html>
